<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FG Service Log</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#EFEFEF;font-family:'Noto Sans KR',sans-serif;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const APP_PW="7895";
const C={teal:"#4AADA8",tealD:"#378884",tealL:"#E8F6F5",tealM:"#C0E8E5",ink:"#1A1A1A",gray:"#888",light:"#F5F5F5",white:"#FFFFFF",red:"#E05555",yellow:"#F5C518",warn:"#FFF8E8",warnB:"#F5C518",green:"#2E7D52",greenL:"#E8F8EF"};
const S={
  app:{fontFamily:"'Noto Sans KR',sans-serif",background:"#EFEFEF",minHeight:"100vh",display:"flex",justifyContent:"center",padding:"20px 0"},
  phone:{width:390,minHeight:844,background:C.white,borderRadius:40,boxShadow:"0 20px 60px rgba(0,0,0,0.18)",overflow:"hidden",display:"flex",flexDirection:"column"},
  hdr:(bg=C.teal)=>({background:bg,padding:"52px 18px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0}),
  ht:{color:C.white,fontWeight:700,fontSize:19,flex:1},
  back:{background:"transparent",border:"none",color:C.white,fontSize:24,cursor:"pointer",padding:"0 2px"},
  body:{flex:1,overflowY:"auto",padding:"18px 18px 90px"},
  bnav:{position:"sticky",bottom:0,background:C.white,borderTop:"1px solid #E8E8E8",display:"flex",justifyContent:"space-around",padding:"10px 0 20px",flexShrink:0},
  nb:(a)=>({display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",color:a?C.teal:C.gray,fontSize:10,fontWeight:a?700:400}),
  card:{background:C.white,borderRadius:14,padding:"14px 16px",marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"},
  tBtn:{background:C.teal,color:C.white,border:"none",borderRadius:12,padding:"13px 0",width:"100%",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:8},
  oBtn:(c=C.teal)=>({background:"transparent",color:c,border:`2px solid ${c}`,borderRadius:12,padding:"11px 0",width:"100%",fontSize:14,fontWeight:600,cursor:"pointer",marginTop:8}),
  inp:{width:"100%",border:"none",borderBottom:"1.5px solid #DDD",padding:"9px 0",fontSize:14,outline:"none",boxSizing:"border-box",background:"transparent"},
  lbl:{fontSize:11,color:C.gray,fontWeight:600,marginBottom:1,display:"block"},
  row:{display:"flex",gap:10,marginBottom:14},
  fld:{marginBottom:14},
  sec:(c=C.teal)=>({fontSize:12,fontWeight:700,color:c,margin:"16px 0 8px",borderLeft:`3px solid ${c}`,paddingLeft:7}),
  badge:(c)=>({display:"inline-block",background:c+"22",color:c,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700}),
  th:{background:C.teal,color:C.white,fontSize:11,fontWeight:700,padding:"7px 8px",textAlign:"center"},
  td:{fontSize:12,padding:"7px 8px",borderBottom:"1px solid #EEE",textAlign:"center"},
};

const F=({label,half,type="text",placeholder=""})=>(
  <div style={half?{flex:1}:S.fld}>
    <span style={S.lbl}>{label}</span>
    <input style={S.inp} type={type} placeholder={placeholder}/>
  </div>
);
const Chk=({label,v,onToggle})=>(
  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #F0F0F0"}}>
    <span style={{fontSize:13,color:C.ink}}>{label}</span>
    <div style={{width:22,height:22,borderRadius:6,border:v?"none":"2px solid #CCC",background:v?C.teal:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}} onClick={onToggle}>
      {v&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
    </div>
  </div>
);
const Hdr=({title,onBack,right,bg})=>(
  <div style={S.hdr(bg)}>
    {onBack&&<button style={S.back} onClick={onBack}>‹</button>}
    <span style={S.ht}>{title}</span>
    {right}
  </div>
);
const Nav=({active,nav})=>{
  const items=[{k:"home",i:"🏠",l:"홈"},{k:"visit",i:"📋",l:"서방지"},{k:"history",i:"📂",l:"히스토리"},{k:"consumption",i:"🧴",l:"소비량"},{k:"faq",i:"🔧",l:"FAQ"}];
  return(<div style={S.bnav}>{items.map(x=>(<button key={x.k} style={S.nb(active===x.k)} onClick={()=>nav(x.k)}><span style={{fontSize:20}}>{x.i}</span>{x.l}</button>))}</div>);
};

function PwGate({onUnlock}){
  const [pw,setPw]=React.useState("");
  const [err,setErr]=React.useState(false);
  const [shake,setShake]=React.useState(false);
  const tryUnlock=()=>{
    if(pw===APP_PW){onUnlock();}
    else{setErr(true);setShake(true);setPw("");setTimeout(()=>setShake(false),500);}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.white}}>
      <div style={{background:C.teal,height:220,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderBottomLeftRadius:32,borderBottomRightRadius:32}}>
        <div style={{background:"rgba(255,255,255,0.2)",borderRadius:18,padding:"12px 26px",marginBottom:10}}>
          <span style={{color:C.white,fontWeight:900,fontSize:30,letterSpacing:2}}>FG</span>
        </div>
        <span style={{color:"rgba(255,255,255,0.85)",fontSize:14}}>Service Log</span>
        <span style={{color:"rgba(255,255,255,0.55)",fontSize:11,marginTop:3,fontStyle:"italic"}}>What does your brand 'SMELL' like?</span>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 36px"}}>
        <div style={{fontSize:36,marginBottom:16}}>🔒</div>
        <div style={{fontWeight:700,fontSize:18,color:C.ink,marginBottom:6}}>접근 제한</div>
        <div style={{fontSize:13,color:C.gray,marginBottom:32,textAlign:"center"}}>FG International 내부 전용 앱입니다.<br/>접근 코드를 입력해 주세요.</div>
        <div style={{width:"100%",transition:"transform 0.1s",transform:shake?"translateX(8px)":"none"}}>
          <span style={S.lbl}>접근 코드</span>
          <input style={{...S.inp,fontSize:22,letterSpacing:8,textAlign:"center",borderColor:err?C.red:"#DDD"}} type="password" maxLength={6} value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&tryUnlock()} placeholder="• • • •" autoFocus/>
          {err&&<div style={{color:C.red,fontSize:12,textAlign:"center",marginTop:8}}>접근 코드가 올바르지 않습니다.</div>}
        </div>
        <button style={{...S.tBtn,marginTop:28}} onClick={tryUnlock}>확인</button>
      </div>
    </div>
  );
}

function Login({onLogin}){
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.white}}>
      <div style={{background:C.teal,height:210,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderBottomLeftRadius:32,borderBottomRightRadius:32}}>
        <div style={{background:"rgba(255,255,255,0.2)",borderRadius:18,padding:"12px 26px",marginBottom:10}}><span style={{color:C.white,fontWeight:900,fontSize:30,letterSpacing:2}}>FG</span></div>
        <span style={{color:"rgba(255,255,255,0.8)",fontSize:13}}>Service Log</span>
        <span style={{color:"rgba(255,255,255,0.55)",fontSize:11,marginTop:3,fontStyle:"italic"}}>What does your brand 'SMELL' like?</span>
      </div>
      <div style={{flex:1,padding:"36px 26px 28px"}}>
        <div style={S.fld}><span style={S.lbl}>아이디</span><input style={S.inp} placeholder="아이디"/></div>
        <div style={S.fld}><span style={S.lbl}>비밀번호</span><input style={S.inp} type="password" placeholder="비밀번호"/></div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:22}}>
          <div style={{width:22,height:22,borderRadius:6,background:C.teal,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:12}}>✓</span></div>
          <span style={{fontSize:13,color:C.gray}}>로그인 상태 유지</span>
        </div>
        <button style={S.tBtn} onClick={onLogin}>로그인</button>
        <div style={{textAlign:"center",marginTop:14}}><span style={{fontSize:13,color:C.gray}}>계정 찾기  |  비밀번호 찾기</span></div>
      </div>
    </div>
  );
}

function Home({nav}){
  const menus=[
    {i:"📝",t:"서비스 방문일지",s:"서방지 작성·전자서명",k:"visit",c:C.teal},
    {i:"📂",t:"히스토리",s:"파트너사별 이력",k:"history",c:"#5BB8B3"},
    {i:"🧴",t:"향료 소비량",s:"기기별 소비 현황",k:"consumption",c:"#6ABFBA"},
    {i:"📊",t:"설치 현황",s:"파트너사 설치 정보",k:"install",c:"#4D9E9A"},
    {i:"💬",t:"만족도 설문",s:"고객 피드백 수집",k:"survey",c:"#7ECAC6"},
    {i:"🔧",t:"FAQ / 정비",s:"기기 트러블슈팅",k:"faq",c:"#378884"},
  ];
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{background:C.teal,padding:"52px 18px 18px",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:C.white,fontWeight:700,fontSize:21}}>FG Service Log</span>
          <span style={{fontSize:22}}>👤</span>
        </div>
        <div style={{marginTop:12,background:"rgba(255,255,255,0.18)",borderRadius:11,padding:"9px 14px",display:"flex",alignItems:"center",gap:8}}>
          <span>🔍</span><span style={{color:"rgba(255,255,255,0.65)",fontSize:13}}>파트너사 검색</span>
        </div>
      </div>
      <div style={S.body}>
        <div style={{background:`linear-gradient(135deg,${C.teal},${C.tealD})`,borderRadius:16,padding:"16px 18px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",boxShadow:`0 4px 16px ${C.teal}44`}} onClick={()=>nav("visit")}>
          <div><div style={{color:C.white,fontWeight:700,fontSize:16}}>서비스 방문일지 작성</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginTop:2}}>탭하여 바로 시작 ▶</div></div>
          <span style={{fontSize:30}}>📝</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {menus.map(m=>(
            <div key={m.k} style={{background:m.c,borderRadius:16,padding:"16px 14px",cursor:"pointer",boxShadow:`0 3px 10px ${m.c}44`,minHeight:90,display:"flex",flexDirection:"column",justifyContent:"space-between"}} onClick={()=>nav(m.k)}>
              <span style={{fontSize:24}}>{m.i}</span>
              <div><div style={{color:C.white,fontWeight:700,fontSize:13}}>{m.t}</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>{m.s}</div></div>
            </div>
          ))}
        </div>
      </div>
      <Nav active="home" nav={nav}/>
    </div>
  );
}

function VisitList({nav,onBack}){
  const partners=["귀중","스타벅스 강남점","롯데호텔 서울","현대백화점 판교","이니스프리 명동"];
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <Hdr title="서비스 방문일지" onBack={onBack}/>
      <div style={S.body}>
        <div style={{background:C.light,borderRadius:11,padding:"9px 13px",display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <span>🔍</span><input style={{...S.inp,borderBottom:"none",fontSize:13}} placeholder="업체명 검색"/>
        </div>
        <div style={S.sec()}>파트너사 선택</div>
        {partners.map(p=>(
          <div key={p} style={{...S.card,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>nav("visit_inner",{partner:p})}>
            <div><div style={{fontWeight:600,fontSize:14}}>{p}</div><div style={{fontSize:11,color:C.gray,marginTop:2}}>최근 방문: 2026.05.10</div></div>
            <span style={{color:C.gray,fontSize:18}}>›</span>
          </div>
        ))}
      </div>
      <Nav active="visit" nav={nav}/>
    </div>
  );
}

function VisitInner({nav,onBack,params}){
  const partner=params&&params.partner?params.partner:"—";
  const [chks,setChks]=React.useState({pump:false,diff:false,leak:false,wipe:false,filter:false,tube:false,timer:false});
  const t=k=>setChks(p=>({...p,[k]:!p[k]}));
  const items=[["pump","펌프 작동"],["diff","디퓨저 상태"],["leak","향기 누출"],["wipe","닦임/오염"],["filter","필터·흡입부 청소"],["tube","튜브 연결"],["timer","타이머 설정"]];
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <Hdr title="서방지 (내부용)" onBack={onBack} right={<span style={{background:C.yellow,color:C.ink,borderRadius:20,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}} onClick={()=>nav("consumption")}>소비량 표 →</span>}/>
      <div style={S.body}>
        <div style={{...S.card,background:C.tealL,border:`1px solid ${C.tealM}`,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><span style={{fontSize:11,color:C.gray}}>파트너사명</span><div style={{fontWeight:700,fontSize:17,color:C.teal}}>{partner}</div></div>
            <div style={{textAlign:"right"}}><span style={{fontSize:11,color:C.gray}}>방문일자</span><div style={{fontWeight:600,fontSize:13}}>2026.05.20</div></div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button style={{background:C.ink,color:C.white,border:"none",borderRadius:8,padding:"7px 13px",fontSize:12,fontWeight:600,cursor:"pointer"}}>서비스 절차</button>
            <button style={{background:C.red,color:C.white,border:"none",borderRadius:8,padding:"7px 13px",fontSize:12,fontWeight:600,cursor:"pointer"}}>주의사항</button>
          </div>
        </div>
        <div style={S.sec()}>기본 정보 (내부)</div>
        <div style={S.row}><F label="담당자" half/><F label="연락처" half/></div>
        <F label="서비스 담당자 (FG)"/>
        <div style={S.row}><F label="사업자 정보" half/><F label="점검 일자" half/></div>
        <div style={S.sec()}>기기 정보</div>
        <F label="향기명"/>
        <div style={S.row}><F label="기기 1" half/><F label="수량" half/></div>
        <div style={S.row}><F label="기기 2" half/><F label="수량" half/></div>
        <F label="설치 위치"/><F label="타겟 공간"/>
        <div style={S.sec()}>발향 점검 (전/후)</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr><th style={S.th}>단계</th><th style={S.th}>가동시간</th><th style={S.th}>펌프</th><th style={S.th}>디퓨저</th><th style={S.th}>누유</th></tr></thead>
            <tbody>{["전","후"].map((l,i)=>(
              <tr key={l} style={{background:i%2===0?C.tealL:C.white}}>
                <td style={S.td}>{l}</td>
                <td style={S.td}><input style={{width:55,border:"none",borderBottom:"1px solid #CCC",textAlign:"center",fontSize:11}}/></td>
                <td style={S.td}><input type="checkbox"/></td><td style={S.td}><input type="checkbox"/></td><td style={S.td}><input type="checkbox"/></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
        <div style={S.sec()}>추가 점검 항목</div>
        <div style={S.card}>{items.map(([k,l])=><Chk key={k} label={l} v={chks[k]} onToggle={()=>t(k)}/>)}</div>
        <div style={S.sec()}>내부 메모</div>
        <F label="이슈/특이사항 (내부 전용)"/><F label="요청/피드백 사항"/><F label="누적 이슈 횟수"/>
        <div style={{marginTop:20,padding:"14px 16px",background:C.tealL,borderRadius:14,border:`1.5px dashed ${C.teal}`,cursor:"pointer"}} onClick={()=>nav("visit_outer",{partner})}>
          <div style={{fontWeight:700,color:C.teal,fontSize:14}}>📄 외부용 서방지 보기 · 서명 받기</div>
          <div style={{fontSize:12,color:C.gray,marginTop:3}}>고객에게 보여주는 버전 — 내부 정보 자동 제외</div>
        </div>
        <button style={S.tBtn}>저장</button>
        <button style={S.oBtn()}>임시 저장</button>
      </div>
    </div>
  );
}

function VisitOuter({onBack,params}){
  const partner=params&&params.partner?params.partner:"—";
  const [signed,setSigned]=React.useState(false);
  const [sent,setSent]=React.useState(false);
  const outerItems=["펌프 작동 상태 확인","디퓨저 상태 점검","향기 누출 여부 확인","필터·흡입부 청소","튜브 연결 상태 확인","타이머 설정 확인","현장 주변 환경 점검"];
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.white}}>
      <Hdr title="서비스 확인서" onBack={onBack} bg={C.tealD}/>
      <div style={S.body}>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontWeight:900,fontSize:20,color:C.teal,letterSpacing:1}}>FG International</div>
          <div style={{fontSize:12,color:C.gray,marginTop:2}}>공간 향 브랜딩 서비스 방문 확인서</div>
        </div>
        <div style={{...S.card,background:C.tealL,border:`1px solid ${C.tealM}`}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><span style={{fontSize:11,color:C.gray}}>업체명</span><div style={{fontWeight:700,fontSize:16}}>{partner}</div></div>
            <div style={{textAlign:"right"}}><span style={{fontSize:11,color:C.gray}}>방문일</span><div style={{fontWeight:600}}>2026.05.20</div></div>
          </div>
        </div>
        <div style={S.sec()}>서비스 정보</div>
        <div style={S.card}>
          {[["향기명","—"],["설치 기기","—"],["설치 위치","—"],["담당자","—"],["연락처","—"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #F0F0F0"}}>
              <span style={{fontSize:13,color:C.gray}}>{l}</span><span style={{fontSize:13,fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={S.sec()}>점검 완료 항목</div>
        <div style={S.card}>
          {outerItems.map(item=>(
            <div key={item} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F0F0F0"}}>
              <div style={{width:20,height:20,borderRadius:10,background:C.teal,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span></div>
              <span style={{fontSize:13}}>{item}</span>
            </div>
          ))}
        </div>
        <div style={S.sec()}>특이사항</div>
        <div style={{...S.card,minHeight:54,fontSize:13,color:C.gray}}>— 없음 —</div>
        <div style={S.sec()}>고객 서명</div>
        {!signed?(
          <div style={{...S.card,minHeight:100,border:`2px dashed ${C.tealM}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:8}} onClick={()=>setSigned(true)}>
            <span style={{fontSize:28}}>✍️</span><span style={{fontSize:13,color:C.gray}}>여기를 탭하여 서명해 주세요</span>
          </div>
        ):(
          <div style={{...S.card,background:C.tealL,border:`1.5px solid ${C.teal}`,display:"flex",alignItems:"center",gap:10}}>

            <div><div style={{fontWeight:700,color:C.teal}}>서명 완료</div><div style={{fontSize:11,color:C.gray}}>2026.05.20 · {partner}</div></div>
          </div>
        )}
        {signed&&!sent&&<button style={S.tBtn} onClick={()=>setSent(true)}>담당자 메일로 전송</button>}
        {sent&&(
          <div style={{...S.card,background:C.greenL,border:`1.5px solid ${C.green}`,marginTop:8,textAlign:"center",padding:"16px"}}>
            <div style={{fontSize:22,marginBottom:6}}>📧</div>
            <div style={{fontWeight:700,color:C.green}}>전송 완료</div>
            <div style={{fontSize:12,color:C.gray,marginTop:4}}>담당자 메일로 서방지가 전송되었습니다.</div>
          </div>

        <div style={{...S.card,background:C.warn,border:`1px solid ${C.warnB}`,marginTop:8}}>
          <div style={{fontWeight:700,fontSize:13,color:"#B8860B",marginBottom:4}}>📤 비현장 전송</div>
          <div style={{fontSize:12,color:C.gray,marginBottom:8}}>현장에 없을 경우 고객에게 링크를 전송하세요.</div>

        </div>
      </div>
    </div>
  );
}

function History({nav,onBack}){

function Consumption({nav,onBack}){
  const [tab,setTab]=React.useState(0);
  const rows=[{p:"귀중",m:"—",y:"—",pv:"—"},{p:"스타벅스 강남점",m:"—",y:"—",pv:"—"},{p:"롯데호텔 서울",m:"—",y:"—",pv:"—"}];

    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <Hdr title="향료 소비량" onBack={onBack}/>

        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {["당해년도","전년도"].map((l,i)=>(

          ))}

        <div style={{...S.card,background:C.tealL,border:`1px solid ${C.tealM}`}}>
          <div style={{display:"flex",justifyContent:"space-around"}}>
            {[["총 소비량","—"],["이번 달","—"],["전월 대비","—"]].map(([l,v])=>(

function FAQ({nav,onBack}){
  const [open,setOpen]=React.useState(null);
  const cats=[
    {t:"상황별 기기 정비",items:["미스트 미분사","분량 저하","소음 발생","과도한 발열","향료 누유","외관 파손"]},
    {t:"기기 정비/검수",items:["전원부 정비","펌프 Ass'y 정비","노즐/분사구 정비","메인 보드 정비","타이머 초기화"]},
    {t:"안내 멘트 가이드",items:["회사 소개 멘트","점검 진행 전 안내","작업 완료 안내","서명 요청","마무리 인사"]},
  ];
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <Hdr title="FAQ / Trouble Shooting" onBack={onBack}/>
      <div style={S.body}>
        <div style={{background:C.light,borderRadius:11,padding:"9px 13px",display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <span>🔍</span><input style={{...S.inp,borderBottom:"none",fontSize:13}} placeholder="항목 검색"/>
        </div>
        {cats.map((cat,ci)=>(
          <div key={cat.t} style={{marginBottom:14}}>
            <div style={S.sec()}>{cat.t}</div>
            {cat.items.map((item,ii)=>{
              const idx=ci*10+ii;
              return(
                <div key={item} style={{...S.card,marginBottom:6,cursor:"pointer",borderLeft:open===idx?`3px solid ${C.teal}`:"3px solid transparent"}} onClick={()=>setOpen(open===idx?null:idx)}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontWeight:600,fontSize:13}}>{item}</span>
                    <span style={{color:C.gray}}>{open===idx?"▲":"▼"}</span>
                  </div>
                  {open===idx&&<div style={{marginTop:8,fontSize:12,color:C.gray,lineHeight:1.6}}>해당 항목 상세 점검 절차 및 조치 안내가 표시됩니다.</div>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
      <Nav active="faq" nav={nav}/>
    </div>
  );
}

function App(){
  const [unlocked,setUnlocked]=React.useState(false);
  const [screen,setScreen]=React.useState("login");
  const [params,setParams]=React.useState({});
  const [hist,setHist]=React.useState([]);
  const nav=(to,p={})=>{setHist(h=>[...h,{screen,params}]);setScreen(to);setParams(p||{});};
  const back=()=>{if(!hist.length)return;const prev=hist[hist.length-1];setHist(h=>h.slice(0,-1));setScreen(prev.screen);setParams(prev.params);};
  const screens={
    login:<Login onLogin={()=>nav("home")}/>,
    home:<Home nav={nav}/>,
    visit:<VisitList nav={nav} onBack={back}/>,
    visit_inner:<VisitInner nav={nav} onBack={back} params={params}/>,
    visit_outer:<VisitOuter onBack={back} params={params}/>,
    history:<History nav={nav} onBack={back}/>,
    consumption:<Consumption nav={nav} onBack={back}/>,
    install:<Install onBack={back}/>,
    survey:<Survey onBack={back}/>,
    faq:<FAQ nav={nav} onBack={back}/>,
  };
  return(
    <div style={S.app}>
      <div style={S.phone}>
        {!unlocked?<PwGate onUnlock={()=>setUnlocked(true)}/>:(screens[screen]||screens.home)}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
